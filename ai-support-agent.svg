<svg viewBox="0 0 1200 534" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <clipPath id="termClip">
      <rect x="150" y="70" width="900" height="380" rx="16"/>
    </clipPath>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1200" height="534" fill="#0a0c10"/>
  <circle cx="980" cy="110" r="420" fill="url(#glowBlue)"/>
  <circle cx="170" cy="470" r="320" fill="url(#glowCyan)"/>

  <!-- faint circuit dots -->
  <g fill="#39414d" opacity="0.6">
    <circle cx="90" cy="100" r="3"/>
    <circle cx="140" cy="80" r="3"/>
    <circle cx="1110" cy="450" r="3"/>
    <circle cx="1060" cy="475" r="3"/>
    <circle cx="1150" cy="490" r="3"/>
  </g>
  <g stroke="#39414d" stroke-width="1.5" opacity="0.5">
    <line x1="90" y1="100" x2="140" y2="80"/>
    <line x1="1060" y1="475" x2="1110" y2="450"/>
    <line x1="1060" y1="475" x2="1150" y2="490"/>
  </g>

  <!-- terminal window -->
  <g clip-path="url(#termClip)">
    <rect x="150" y="70" width="900" height="380" fill="#13161b"/>
    <rect x="150" y="70" width="900" height="46" fill="#1a1e25"/>
  </g>
  <rect x="150" y="70" width="900" height="380" rx="16" fill="none" stroke="#272c34" stroke-width="1.5"/>
  <line x1="150" y1="116" x2="1050" y2="116" stroke="#272c34" stroke-width="1"/>

  <!-- traffic lights -->
  <circle cx="180" cy="93" r="6" fill="#ff5f56"/>
  <circle cx="202" cy="93" r="6" fill="#ffbd2e"/>
  <circle cx="224" cy="93" r="6" fill="#27c93f"/>

  <text x="600" y="98" text-anchor="middle" font-family="SFMono-Regular, Consolas, 'Courier New', monospace" font-size="14" fill="#7a828e">ai-customer-support-agent — main.py</text>

  <!-- terminal body -->
  <g font-family="SFMono-Regular, Consolas, 'Courier New', monospace" font-size="17">
    <text x="185" y="158"><tspan fill="#5ec2ff">$ </tspan><tspan fill="#c9d1d9">python3 main.py</tspan></text>
    <text x="185" y="192" fill="#6ee7a8">=== TechCorp Support Agent ===</text>

    <text x="185" y="240"><tspan fill="#e8edf2" font-weight="600">YOU: </tspan><tspan fill="#c9d1d9">How do I reset my password?</tspan></text>

    <text x="185" y="276"><tspan fill="#79c0ff" font-weight="600">AGENT: </tspan><tspan fill="#9fa8b3">Click the "Forgot Password" link on</tspan></text>
    <text x="185" y="302" fill="#9fa8b3">         the login page — you'll get reset</text>
    <text x="185" y="328" fill="#9fa8b3">         instructions within a few minutes.</text>

    <text x="185" y="374"><tspan fill="#e8edf2" font-weight="600">YOU: </tspan></text>
    <rect x="247" y="358" width="11" height="20" fill="#5ec2ff">
      <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.4;0.5;0.9;1" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- bot badge -->
  <circle cx="150" cy="70" r="34" fill="url(#badgeGrad)"/>
  <circle cx="150" cy="70" r="34" fill="none" stroke="#0a0c10" stroke-width="4"/>
  <g transform="translate(150,70)" fill="#ffffff">
    <rect x="-14" y="-11" width="28" height="19" rx="6"/>
    <path d="M -6 8 L 0 16 L 6 8 Z"/>
    <circle cx="-6" cy="-1.5" r="2.6" fill="#0a0c10"/>
    <circle cx="6" cy="-1.5" r="2.6" fill="#0a0c10"/>
  </g>

  <!-- sticker tag -->
  <g transform="translate(940,418) rotate(-4)">
    <rect x="-118" y="-22" width="236" height="44" rx="22" fill="#e8edf2"/>
    <text x="0" y="6" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#0a0c10">Python  ·  Claude API</text>
  </g>
</svg>
